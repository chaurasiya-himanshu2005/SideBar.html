<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left Sidebar</title>
    <style>
        .sidebar-section{
            height: 800px;
            width: 250px;
            border: 1px solid black;
            background-color: black;
            color: white;
            border-radius: 5px;
        }
        .side-section{
            display: flex;
            text-align: center;
            margin-left: 50px;
        }
        .item{
            font-family: Arial, Helvetica, sans-serif;
            font-size: medium;
            font-weight: 500;
            cursor: pointer;
            margin-left: 25px;
            padding: 4px;
        }
        .logout button{
            font-family: Arial, Helvetica, sans-serif;
            font-size: medium;
            font-weight: 500;
            cursor: pointer;
            color: white;
            margin-top: 550px;
            margin-left: 25px;
            padding: 8px 15px 8px 15px;
            background-color: blue;
            border: none;
            border-radius: 5px;
        }
        .item:hover{
            color: red;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar-section">
        <div class="side-section">
            <h1>Logo</h1>
        </div>

        <nav>
            <div class="item">Dashboard</div>
            <div class="item">Profile</div>
            <div class="item">Setting</div>
            <div class="item">Reports</div>
        </nav>

        <div class="logout">
            <button>Logout</button>
        </div>
    </div>
</body>
</html>
